<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORΛX Merchant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:#fff;
}

.wrapper{
max-width:430px;
margin:auto;
min-height:100vh;
padding:20px 20px 110px;
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.brand{
font-size:24px;
letter-spacing:6px;
font-weight:300;
}

.user{
width:42px;
height:42px;
border-radius:50%;
background:#a855f7;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
box-shadow:0 0 20px rgba(168,85,247,.45);
}

/* HERO */

.hero{
background:linear-gradient(135deg,#111,#1a1a1a);
border-radius:26px;
padding:24px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 30px rgba(168,85,247,.08);
position:relative;
overflow:hidden;
}

.hero::after{
content:"";
position:absolute;
width:180px;
height:180px;
background:rgba(168,85,247,.12);
border-radius:50%;
top:-70px;
right:-70px;
filter:blur(50px);
}

.hero small{
color:#888;
letter-spacing:2px;
}

.hero h1{
font-size:32px;
margin-top:10px;
}

.hero p{
margin-top:8px;
font-size:14px;
color:#bbb;
line-height:1.6;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-top:22px;
}

.card{
background:#111;
border-radius:20px;
padding:18px;
border:1px solid rgba(255,255,255,.06);
}

.card small{
color:#888;
font-size:12px;
}

.card h3{
margin-top:8px;
font-size:24px;
color:#a855f7;
}

/* CHECKOUT */

.box{
margin-top:22px;
background:#111;
border-radius:22px;
padding:20px;
border:1px solid rgba(255,255,255,.06);
}

.box h2{
font-size:18px;
margin-bottom:14px;
}

.input,
.select{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:14px;
background:#0a0a0a;
color:#fff;
font-size:15px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.05);
}

.qr{
width:180px;
height:180px;
margin:14px auto;
border-radius:18px;
background:
linear-gradient(45deg,#fff 25%,#000 25%,#000 50%,#fff 50%,#fff 75%,#000 75%,#000);
background-size:24px 24px;
border:8px solid #fff;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#a855f7;
color:#fff;
font-weight:700;
letter-spacing:3px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 24px rgba(168,85,247,.45);
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:430px;
max-width:100%;
background:#0c0c0c;
border-top:1px solid rgba(255,255,255,.06);
display:grid;
grid-template-columns:repeat(4,1fr);
padding:14px 0;
}

.nav div{
text-align:center;
font-size:12px;
color:#777;
cursor:pointer;
}

.nav span{
display:block;
font-size:20px;
margin-bottom:6px;
}

.active{
color:#a855f7 !important;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="top">
<div class="brand">CORΛX</div>
<div class="user">B</div>
</div>

<div class="hero">
<small>BUSINESS PAYMENTS</small>
<h1>Merchant Hub</h1>
<p>
Receba pagamentos globais com stablecoins, liquidação rápida e taxas menores.
</p>
</div>

<div class="stats">

<div class="card">
<small>Today's Sales</small>
<h3>$4,820</h3>
</div>

<div class="card">
<small>Monthly Volume</small>
<h3>$72K</h3>
</div>

<div class="card">
<small>Paid Orders</small>
<h3>128</h3>
</div>

<div class="card">
<small>CORΛX Fee</small>
<h3>0.25%</h3>
</div>

</div>

<div class="box">

<h2>Create Payment</h2>

<input type="text" class="input" placeholder="Product / Service">

<input type="number" class="input" placeholder="Amount">

<select class="select">
<option>USDT</option>
<option>USDC</option>
<option>ETH</option>
<option>BNB</option>
</select>

<div class="qr"></div>

<button class="btn" onclick="createCharge()">
GENERATE CHECKOUT
</button>

</div>

</div>

<div class="nav">
<div onclick="goHome()"><span>🏠</span>Home</div>
<div onclick="goHistory()"><span>📜</span>Sales</div>
<div class="active" onclick="goMerchant()"><span>🏪</span>Merchant</div>
<div onclick="goSettings()"><span>⚙️</span>Settings</div>
</div>

<script>
function createCharge(){
alert('Checkout CORΛX gerado com sucesso.');
}

function goHome(){
window.location.href='app.html';
}

function goHistory(){
window.location.href='history.html';
}

function goMerchant(){
window.location.href='merchant.html';
}

function goSettings(){
window.location.href='settings.html';
}
</script>

</body>
</html>
