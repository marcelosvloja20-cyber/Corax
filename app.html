<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORAX APP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#050505;
    color:#fff;
    overflow-x:hidden;
}

.wrapper{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    padding:20px;
}

/* TOPBAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.brand{
    font-size:24px;
    letter-spacing:6px;
    font-weight:300;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#a855f7;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    box-shadow:0 0 20px rgba(168,85,247,.4);
}

/* BALANCE */

.balance{
    background:linear-gradient(135deg,#111,#1e1e1e);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    padding:24px;
    box-shadow:0 0 30px rgba(168,85,247,.08);
}

.balance small{
    color:#888;
    letter-spacing:2px;
}

.amount{
    font-size:42px;
    margin-top:10px;
    font-weight:700;
    color:#a855f7;
}

.wallet{
    margin-top:10px;
    color:#999;
    font-size:14px;
}

/* ACTIONS */

.actions{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-top:22px;
}

.action{
    background:#111;
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:16px 8px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.action:hover{
    transform:translateY(-4px);
    border-color:#a855f7;
}

.action span{
    display:block;
    font-size:22px;
    margin-bottom:8px;
}

.action p{
    font-size:12px;
    color:#aaa;
}

/* SECTION */

.section-title{
    margin-top:32px;
    margin-bottom:15px;
    font-size:18px;
    color:#ddd;
}

/* TOKENS */

.tokens{
    display:grid;
    gap:12px;
}

.token{
    background:#111;
    border-radius:18px;
    padding:16px;
    border:1px solid rgba(255,255,255,.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.token-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.coin{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#a855f7;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.token-name{
    font-size:15px;
}

.token-sub{
    font-size:12px;
    color:#888;
}

.token-price{
    text-align:right;
}

.token-price strong{
    display:block;
}

.token-price span{
    color:#22c55e;
    font-size:12px;
}

/* HISTORY */

.history{
    display:grid;
    gap:12px;
}

.tx{
    background:#111;
    border-radius:18px;
    padding:15px;
    border:1px solid rgba(255,255,255,.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tx small{
    color:#888;
}

.plus{
    color:#22c55e;
}

.minus{
    color:#ef4444;
}

/* NAV */

.nav{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:430px;
    max-width:100%;
    background:#0c0c0c;
    border-top:1px solid rgba(255,255,255,.06);
    display:grid;
    grid-template-columns:repeat(4,1fr);
    padding:14px 0;
}

.nav div{
    text-align:center;
    font-size:12px;
    color:#888;
}

.nav span{
    display:block;
    font-size:20px;
    margin-bottom:6px;
}

.active{
    color:#a855f7 !important;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
<h1 class="brand">CORAX</h1>
<div class="avatar">C</div>
</div>

<div class="balance">
<small>TOTAL BALANCE</small>
<div class="amount">$12,840.55</div>
<div class="wallet">0x7f2...a9d1</div>
</div>

<div class="actions">
<div class="action">
<span>⬇️</span>
<p>Receive</p>
</div>

<div class="action">
<span>⬆️</span>
<p>Send</p>
</div>

<div class="action">
<span>💰</span>
<p>Stake</p>
</div>

<div class="action">
<span>🎁</span>
<p>Airdrop</p>
</div>
</div>

<h2 class="section-title">Assets</h2>

<div class="tokens">

<div class="token">
<div class="token-left">
<div class="coin">C</div>
<div>
<div class="token-name">CORAX</div>
<div class="token-sub">4,250 CRX</div>
</div>
</div>

<div class="token-price">
<strong>$8,500</strong>
<span>+12.4%</span>
</div>
</div>

<div class="token">
<div class="token-left">
<div class="coin">E</div>
<div>
<div class="token-name">Ethereum</div>
<div class="token-sub">1.82 ETH</div>
</div>
</div>

<div class="token-price">
<strong>$3,210</strong>
<span>+2.1%</span>
</div>
</div>

</div>

<h2 class="section-title">Recent Activity</h2>

<div class="history">

<div class="tx">
<div>
<strong>Received</strong>
<br>
<small>2 min ago</small>
</div>
<div class="plus">+$320</div>
</div>

<div class="tx">
<div>
<strong>Sent</strong>
<br>
<small>1 hour ago</small>
</div>
<div class="minus">-$120</div>
</div>

<div class="tx">
<div>
<strong>Stake Reward</strong>
<br>
<small>Today</small>
</div>
<div class="plus">+$48</div>
</div>

</div>

</div>

<div class="nav">
<div class="active"><span>🏠</span>Home</div>
<div><span>📊</span>Market</div>
<div><span>🔔</span>Alerts</div>
<div><span>⚙️</span>Settings</div>
</div>

</body>
</html>
