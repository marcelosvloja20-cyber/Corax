<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX | Shadow Ecosystem</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --p: #9d4edd; 
            --bg: #050505; 
            --glass: rgba(157, 78, 221, 0.08); 
            --border: rgba(157, 78, 221, 0.2);
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(5, 5, 5, 0.9), rgba(5, 5, 5, 0.98)), 
                        url('9a79db2d-571d-48b1-b270-0428e3dde4de.png');
            background-size: cover; background-position: center;
            z-index: -1; filter: brightness(0.5);
        }

        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 10;
        }

        .logo { font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 4px; font-weight: bold; }
        .logo span { color: var(--p); }

        .wallet-pill {
            background: var(--glass); border: 1px solid var(--p); padding: 6px 12px;
            border-radius: 20px; font-size: 0.6rem; font-family: 'Orbitron'; color: var(--p);
        }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; z-index: 5; }

        .view-container { width: 100%; max-width: 420px; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 25px; 
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }

        h2 { font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 20px; text-align: center; color: var(--p); }

        /* Estilos de Componentes */
        .token-box { background: rgba(0,0,0,0.5); border: 1px solid #1a1a1a; padding: 15px; border-radius: 14px; margin-bottom: 8px; }
        .token-box label { display: block; font-family: 'Orbitron'; font-size: 0.5rem; color: #555; margin-bottom: 5px; }
        input { background: transparent; border: none; color: white; font-size: 1.4rem; width: 60%; outline: none; font-weight: bold; }
        .token-tag { background: var(--p); color: #000; padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; font-family: 'Orbitron'; }

        .btn-action {
            width: 100%; padding: 16px; background: var(--p); border: none; border-radius: 12px;
            color: #000; font-family: 'Orbitron'; font-weight: bold; font-size: 0.8rem;
            margin-top: 15px; cursor: pointer; letter-spacing: 2px;
        }

        /* ⚓ Navegação Inferior */
        nav {
            height: 75px; background: rgba(10, 10, 10, 0.98); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px;
        }

        .nav-item { 
            text-decoration: none; color: #444; font-size: 0.55rem; 
            text-transform: uppercase; font-family: 'Orbitron'; display: flex; flex-direction: column; align-items: center;
        }

        .nav-item.active { color: var(--p); }
        .nav-icon { font-size: 1.2rem; margin-bottom: 4px; }

        /* Utilitários Dashboard */
        .balance-hero { text-align: center; padding: 20px 0; }
        .balance-hero h3 { font-size: 2.2rem; margin: 5px 0; }
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #111; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <header>
        <div class="logo">COR<span>A</span>X</div>
        <div class="wallet-pill" onclick="alert('Conectando carteira...')">CONECTAR</div>
    </header>

    <main id="app-view">
        <!-- Injetado via JS -->
    </main>

    <nav>
        <a href="javascript:void(0)" class="nav-item" onclick="showView('dashboard', this)">
            <span class="nav-icon">📊</span>Início
        </a>
        <a href="javascript:void(0)" class="nav-item active" onclick="showView('swap', this)">
            <span class="nav-icon">🔄</span>Swap
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showView('stake', this)">
            <span class="nav-icon">💰</span>Stake
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showView('airdrop', this)">
            <span class="nav-icon">🪂</span>Airdrop
        </a>
    </nav>

    <script>
        const rate = 2450.00;

        const screens = {
            dashboard: `
                <div class="view-container">
                    <div class="card">
                        <h2>PORTFÓLIO</h2>
                        <div class="balance-hero">
                            <p style="font-size: 0.6rem; color: #555; font-family: 'Orbitron';">SALDO TOTAL</p>
                            <h3>$ 0,00</h3>
                        </div>
                        <div class="list-item"><span>ETH</span><b>0.00</b></div>
                        <div class="list-item"><span>CRX</span><b>0.00</b></div>
                    </div>
                </div>`,
            swap: `
                <div class="view-container">
                    <div class="card">
                        <h2>SHADOW SWAP</h2>
                        <div class="token-box">
                            <label>ENVIAR</label>
                            <div class="input-row">
                                <input type="number" id="in-amt" placeholder="0.0" oninput="doMath()">
                                <div class="token-tag">ETH</div>
                            </div>
                        </div>
                        <div style="text-align:center; color:var(--p); margin:-10px 0 5px 0">↓</div>
                        <div class="token-box">
                            <label>RECEBER</label>
                            <div class="input-row">
                                <input type="number" id="out-amt" placeholder="0.0" readonly>
                                <div class="token-tag" style="background:#fff">CRX</div>
                            </div>
                        </div>
                        <button class="btn-action" onclick="alert('Swap Iniciado!')">EXECUTAR</button>
                    </div>
                </div>`,
            stake: `
                <div class="view-container">
                    <div class="card">
                        <h2>STAKING POOL</h2>
                        <p style="font-size:0.7rem; color:#888; text-align:center; margin-bottom:15px;">Rendimento anual estimado:</p>
                        <div style="font-size:1.5rem; text-align:center; color:#4ade80; font-weight:bold; margin-bottom:20px;">12.5% APY</div>
                        <div class="token-box">
                            <label>VALOR PARA STAKE</label>
                            <input type="number" placeholder="0.0">
                        </div>
                        <button class="btn-action" style="background:#4ade80">BLOQUEAR CRX</button>
                    </div>
                </div>`,
            airdrop: `
                <div class="view-container">
                    <div class="card" style="border-color: #4cc9f0;">
                        <h2 style="color:#4cc9f0">AIRDROP</h2>
                        <p style="font-size:0.75rem; color:#888; text-align:center; line-height:1.4;">Você tem recompensas pendentes para resgate na rede Base.</p>
                        <div style="margin:20px 0; padding:15px; background:rgba(76,201,240,0.1); border-radius:12px; text-align:center;">
                            <span style="font-size:1.2rem; font-weight:bold; color:#4cc9f0">500.00 CRX</span>
                        </div>
                        <button class="btn-action" style="background:#4cc9f0">CLAIM REWARDS</button>
                    </div>
                </div>`
        };

        function showView(id, el) {
            document.getElementById('app-view').innerHTML = screens[id];
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function doMath() {
            const i = document.getElementById('in-amt');
            const o = document.getElementById('out-amt');
            if(i.value > 0) o.value = (i.value * (rate * 0.99)).toFixed(2);
            else o.value = "";
        }

        window.onload = () => showView('swap');
    </script>
</body>
</html>
