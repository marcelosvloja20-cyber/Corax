<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX OS | Premium</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --p: #9d4edd; 
            --bg: #050505; 
            --card: rgba(15, 15, 15, 0.75);
            --border: rgba(157, 78, 221, 0.25); 
            --text: #ffffff; 
            --dim: #777777;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* 🌌 BACKGROUND COM O CORVO */
        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.95)), 
                        url('9a79db2d-571d-48b1-b270-0428e3dde4de.png');
            background-size: cover; background-position: center;
            z-index: -1; filter: brightness(0.5);
        }

        /* 📱 HEADER */
        header { padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .os-brand { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 5px; color: var(--p); font-weight: bold; text-shadow: 0 0 10px rgba(157, 78, 221, 0.5); }
        .top-icons { display: flex; gap: 18px; }
        .top-icons span { font-size: 1.1rem; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .top-icons span:hover { opacity: 1; color: var(--p); }

        /* 🔄 CONTEÚDO COM TRANSIÇÃO */
        main { flex: 1; overflow-y: auto; padding: 0 20px; display: flex; flex-direction: column; transition: opacity 0.3s ease; }
        .view-container { animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); margin-bottom: 100px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* 📊 COMPONENTES PREMIUM (GLASSMORPISM) */
        .chart-box { 
            background: var(--card); height: 160px; border-radius: 24px; margin-bottom: 20px; 
            display: flex; align-items: center; justify-content: center; 
            backdrop-filter: blur(12px); border: 1px solid var(--border);
        }
        .chart-line { 
            width: 85%; height: 50px; border-bottom: 3px solid var(--p); border-radius: 50%; 
            filter: drop-shadow(0 0 12px var(--p)); animation: pulseChart 4s infinite ease-in-out;
        }
        @keyframes pulseChart { 0%, 100% { opacity: 0.6; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.1); } }

        .row-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            backdrop-filter: blur(12px); border: 1px solid var(--border);
            border-left: 4px solid var(--p);
        }
        .stat-card h4 { font-family: 'Orbitron'; font-size: 0.55rem; color: var(--dim); margin-bottom: 8px; letter-spacing: 1px; }
        .stat-card .val { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }
        .stat-card .purple { color: var(--p); text-shadow: 0 0 8px rgba(157, 78, 221, 0.4); }

        .action-card { 
            background: var(--card); padding: 25px; border-radius: 24px; 
            backdrop-filter: blur(12px); border: 1px solid var(--border);
        }
        .action-card h3 { font-family: 'Orbitron'; font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 20px; opacity: 0.9; }
        
        .input-group { background: rgba(0,0,0,0.4); border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 0.9rem; font-weight: 500; }
        input::placeholder { color: #444; }

        .btn-main { 
            width: 100%; padding: 20px; background: var(--p); border: none; border-radius: 14px; 
            color: #000; font-family: 'Orbitron'; font-weight: bold; font-size: 0.85rem; 
            margin-top: 10px; cursor: pointer; letter-spacing: 2px; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(157, 78, 221, 0.3);
        }
        .btn-main:active { transform: scale(0.97); box-shadow: 0 0 30px var(--p); }

        /* ⚓ NAVEGAÇÃO INFERIOR */
        nav { 
            height: 85px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--border); 
            display: flex; justify-content: space-around; align-items: center; 
            padding-bottom: env(safe-area-inset-bottom); backdrop-filter: blur(20px);
        }
        .nav-item { text-decoration: none; color: #444; font-size: 0.55rem; font-family: 'Orbitron'; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.3s; }
        .nav-item.active { color: var(--p); transform: translateY(-3px); }
        .nav-icon { font-size: 1.4rem; }

        /* 💬 BOTÃO CHAT FLUTUANTE */
        .chat-btn { 
            position: fixed; bottom: 105px; right: 25px; background: var(--p); 
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 1.5rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 100;
            animation: bounce 3s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <header>
        <div class="os-brand">CORAX • OS</div>
        <div class="top-icons">
            <span onclick="alert('Centro de Alertas CORAX')">🔔</span>
            <span onclick="alert('Histórico de Transações')">🕒</span>
            <span onclick="alert('Configurações do Sistema')">⚙️</span>
        </div>
    </header>

    <main id="view-content">
        <!-- Renderizado dinamicamente -->
    </main>

    <div class="chat-btn" onclick="alert('Suporte Corax iniciado...')">💬</div>

    <nav>
        <a href="javascript:void(0)" class="nav-item active" onclick="render('dash', this)">
            <span class="nav-icon">📊</span> PORTAL
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="render('swap', this)">
            <span class="nav-icon">🔄</span> SWAP
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="render('stake', this)">
            <span class="nav-icon">💰</span> STAKING
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="render('rewards', this)">
            <span class="nav-icon">🎁</span> REWARDS
        </a>
    </nav>

    <script>
        const state = { saldo: "14.250", apy: "18.5%" };

        const views = {
            dash: `
                <div class="view-container">
                    <div class="chart-box"><div class="chart-line"></div></div>
                    <div class="row-stats">
                        <div class="stat-card"><h4>SALDO DISPONÍVEL</h4><div class="val">${state.saldo} CRX</div></div>
                        <div class="stat-card"><h4>RENDIMENTO ATUAL</h4><div class="val purple">${state.apy} APY</div></div>
                    </div>
                    <div class="action-card">
                        <h3>TRANSFERÊNCIA RÁPIDA</h3>
                        <div class="input-group"><input type="text" placeholder="Endereço de destino (0x...)"></div>
                        <div class="input-group"><input type="number" placeholder="Quantia CRX"></div>
                        <button class="btn-main">CONFIRMAR ENVIO</button>
                    </div>
                </div>`,
            swap: `
                <div class="view-container">
                    <div class="action-card">
                        <h3>SHADOW SWAP</h3>
                        <p style="font-size:0.65rem; color:var(--dim); margin-bottom:15px; font-family:'Orbitron'">Taxa de rede: 0.001 ETH</p>
                        <div class="input-group"><label style="font-size:0.5rem; color:var(--p); display:block; margin-bottom:5px; font-family:'Orbitron'">VOCÊ ENVIA</label><input type="number" placeholder="0.0 ETH"></div>
                        <div style="text-align:center; color:var(--p); margin:10px 0; font-size:1.2rem;">⇅</div>
                        <div class="input-group"><label style="font-size:0.5rem; color:var(--dim); display:block; margin-bottom:5px; font-family:'Orbitron'">VOCÊ RECEBE</label><input type="number" placeholder="0.0 CRX" readonly></div>
                        <button class="btn-main">EFETUAR TROCA</button>
                    </div>
                </div>`,
            stake: `
                <div class="view-container">
                    <div class="action-card">
                        <h3>STAKING POOL</h3>
                        <div style="background:rgba(74, 222, 128, 0.1); padding:15px; border-radius:12px; border:1px solid rgba(74, 222, 128, 0.2); margin-bottom:20px; text-align:center;">
                            <p style="color:#4ade80; font-family:'Orbitron'; font-size:0.6rem;">LUCRO ESTIMADO POR ANO</p>
                            <h2 style="color:#4ade80; font-size:1.8rem; margin-top:5px;">+2.450 CRX</h2>
                        </div>
                        <div class="input-group"><input type="number" placeholder="Quantidade para travar"></div>
                        <button class="btn-main" style="background:#4ade80">ATIVAR STAKE</button>
                    </div>
                </div>`,
            rewards: `
                <div class="view-container">
                    <div class="action-card" style="text-align:center; border-top: 4px solid #4cc9f0;">
                        <h3>RECOMPENSAS DISPONÍVEIS</h3>
                        <div style="font-size:3rem; margin:30px 0; filter: drop-shadow(0 0 15px #4cc9f0);">🎁</div>
                        <h2 style="color:#4cc9f0; font-size:1.5rem; margin-bottom:10px;">750.00 CRX</h2>
                        <p style="font-size:0.7rem; color:var(--dim); margin-bottom:30px; line-height:1.5;">Parabéns! Você foi elegível para o Airdrop da Temporada 1 na rede Base.</p>
                        <button class="btn-main" style="background:#4cc9f0">REIVINDICAR AGORA</button>
                    </div>
                </div>`
        };

        function render(id, el) {
            const main = document.getElementById('view-content');
            main.style.opacity = '0';
            
            setTimeout(() => {
                main.innerHTML = views[id];
                main.style.opacity = '1';
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                if(el) el.classList.add('active');
            }, 150);
        }

        window.onload = () => render('dash', document.querySelector('.nav-item'));
    </script>
</body>
</html>
