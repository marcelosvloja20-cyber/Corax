<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX OS</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --p: #9d4edd; --bg: #050505; --card: #0f0f0f;
            --border: #1a1a1a; --text: #ffffff; --dim: #555555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER (Conforme o print) */
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .os-brand { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 5px; color: var(--p); font-weight: bold; }
        .top-icons { display: flex; gap: 15px; }
        .top-icons span { font-size: 1.2rem; cursor: pointer; opacity: 0.8; }

        /* CONTEÚDO DINÂMICO */
        main { flex: 1; overflow-y: auto; padding: 0 20px; display: flex; flex-direction: column; }
        .view-container { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* COMPONENTES DO PRINT */
        .chart-box { background: var(--card); height: 150px; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .chart-line { width: 90%; height: 60px; border-bottom: 2px solid var(--p); border-radius: 50%; box-shadow: 0 15px 20px -10px var(--p); }

        .row-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 3px solid var(--p); }
        .stat-card h4 { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--dim); margin-bottom: 8px; text-transform: uppercase; }
        .stat-card .val { font-size: 1.1rem; font-weight: bold; }
        .stat-card .purple { color: var(--p); }

        /* ÁREA DE TRANSFERÊNCIA/SWAP */
        .action-card { background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 100px; }
        .action-card h3 { font-family: 'Orbitron'; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        
        .input-group { background: #000; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #1a1a1a; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 0.9rem; }
        input::placeholder { color: #333; }

        .btn-main { width: 100%; padding: 18px; background: var(--p); border: none; border-radius: 12px; color: #000; font-family: 'Orbitron'; font-weight: bold; font-size: 0.8rem; margin-top: 10px; cursor: pointer; letter-spacing: 2px; }

        /* NAVEGAÇÃO INFERIOR */
        nav { height: 80px; background: #000; border-top: 1px solid #111; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-decoration: none; color: #333; font-size: 0.5rem; font-family: 'Orbitron'; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--p); }

        /* BOTÃO FLUTUANTE DE CHAT */
        .chat-btn { position: fixed; bottom: 100px; right: 25px; background: var(--p); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 100; }
    </style>
</head>
<body>

    <header>
        <div class="os-brand">CORAX • OS</div>
        <div class="top-icons">
            <span onclick="alert('Notificações')">🔔</span>
            <span onclick="alert('Histórico')">🕒</span>
            <span onclick="alert('Configurações')">⚙️</span>
        </div>
    </header>

    <main id="view-content">
        <!-- Renderizado via JS -->
    </main>

    <div class="chat-btn">💬</div>

    <nav>
        <a href="javascript:void(0)" class="nav-item active" onclick="render('dash', this)">
            <span>📊</span> PORTAL
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="render('swap', this)">
            <span>🔄</span> SWAP
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="render('stake', this)">
            <span>💰</span> STAKING
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="render('rewards', this)">
            <span>🎁</span> REWARDS
        </a>
    </nav>

    <script>
        const state = { saldo: "14.250", apy: "18.5%" };

        const views = {
            dash: `
                <div class="view-container">
                    <div class="chart-box"><div class="chart-line"></div></div>
                    <div class="row-stats">
                        <div class="stat-card"><h4>Saldo</h4><div class="val">${state.saldo} CRX</div></div>
                        <div class="stat-card"><h4>Staking</h4><div class="val purple">${state.apy} APY</div></div>
                    </div>
                    <div class="action-card">
                        <h3>Transferência</h3>
                        <div class="input-group"><input type="text" placeholder="Destinatário 0x..."></div>
                        <div class="input-group"><input type="number" placeholder="Valor CRX"></div>
                        <button class="btn-main">ENVIAR AGORA</button>
                    </div>
                </div>`,
            swap: `
                <div class="view-container">
                    <div class="action-card">
                        <h3>Shadow Swap</h3>
                        <div class="input-group"><label style="font-size:0.5rem; color:#555">DE</label><input type="number" placeholder="0.0 ETH"></div>
                        <div style="text-align:center; color:var(--p); margin:10px 0;">⇅</div>
                        <div class="input-group"><label style="font-size:0.5rem; color:#555">PARA</label><input type="number" placeholder="0.0 CRX" readonly></div>
                        <button class="btn-main">TROCAR ATIVOS</button>
                    </div>
                </div>`,
            stake: `
                <div class="view-container">
                    <div class="action-card">
                        <h3>Lock Tokens</h3>
                        <p style="font-size:0.7rem; color:#555; margin-bottom:15px;">Bloqueie seus CRX para ganhar recompensas diárias.</p>
                        <div class="input-group"><input type="number" placeholder="Quantia para Stake"></div>
                        <button class="btn-main">CONFIRMAR STAKE</button>
                    </div>
                </div>`,
            rewards: `
                <div class="view-container">
                    <div class="action-card" style="text-align:center;">
                        <h3>Recompensas</h3>
                        <div style="font-size:2rem; margin:20px 0;">🎁 750 CRX</div>
                        <p style="font-size:0.7rem; color:#555; margin-bottom:20px;">Você tem um airdrop pendente na rede Base.</p>
                        <button class="btn-main">RESGATAR AGORA</button>
                    </div>
                </div>`
        };

        function render(id, el) {
            document.getElementById('view-content').innerHTML = views[id];
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        // Inicia na Dashboard (Portal)
        window.onload = () => render('dash', document.querySelector('.nav-item'));
    </script>
</body>
</html>
