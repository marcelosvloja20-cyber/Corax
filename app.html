<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX | Pagamentos Descentralizados</title>
    
    <!-- Configurações PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="9a79db2d-571d-48b1-b270-0428e3dde4de.png">

    <!-- Fontes Futuristas -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --p: #9d4edd; /* Roxo Corax */
            --bg: #050505;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg);
            overflow: hidden;
        }

        /* 🦅 BACKGROUND IMERSIVO (O ROSTO DO CORVO) */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* A imagem do corvo é ampliada e fica transparente no fundo */
            background: linear-gradient(rgba(5, 5, 5, 0.7), rgba(5, 5, 5, 0.9)), 
                        url('9a79db2d-571d-48b1-b270-0428e3dde4de.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: contrast(1.1) brightness(0.8);
            transform: scale(1.1); /* Leve zoom para o rosto preencher as bordas */
        }

        /* Camada de Brilho Roxo Central */
        .glow-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Conteúdo Principal */
        main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Empurra os textos para baixo para dar destaque ao rosto */
            padding-bottom: 80px;
            z-index: 10;
            position: relative;
        }

        /* Branding Corax Ampliado */
        .brand-container {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 18px;
            color: white;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(157, 78, 221, 0.6);
            margin-bottom: 5px;
            font-weight: 700;
        }

        h1 span {
            color: var(--p);
        }

        .slogan {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* Botão de Ação Estilizado */
        .btn-launch { 
            padding: 20px 60px; 
            background: var(--p); 
            color: #000; 
            text-decoration: none; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: bold; 
            font-size: 0.8rem; 
            letter-spacing: 4px; 
            border-radius: 4px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.4); 
            text-transform: uppercase;
        }

        .btn-launch:active { 
            transform: scale(0.95); 
            box-shadow: 0 0 50px var(--p); 
        }

        /* Footer Discreto */
        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        footer a {
            color: var(--p);
            text-decoration: none;
            margin-left: 10px;
        }

    </style>
</head>
<body>

    <!-- Camadas Visuais -->
    <div class="hero-background"></div>
    <div class="glow-overlay"></div>

    <main>
        <!-- Nome da Marca e Slogan -->
        <div class="brand-container">
            <h1>COR<span>A</span>X</h1>
            <p class="slogan">Pagamentos Descentralizados</p>
        </div>

        <!-- Botão Principal -->
        <a href="login.html" class="btn-launch">LAUNCH APP</a>
    </main>

    <footer>
        &copy; 2026 CORAX ECOSYSTEM | <a href="about.html">SAIBA MAIS</a>
    </footer>

    <!-- Service Worker para PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>

</body>
</html>
