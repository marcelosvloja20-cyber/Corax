
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Dashboard Live</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; padding-bottom: 80px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(157, 78, 221, 0.2); margin-bottom: 25px; }
        .logo-small { font-family: 'Orbitron'; letter-spacing: 4px; color: var(--p); font-size: 1rem; }
        .wallet-info { background: var(--glass); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--p); font-size: 0.6rem; font-family: 'Orbitron'; }

        /* Gráfico e Cards */
        .chart-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        canvas { width: 100% !important; height: 120px !important; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--glass); border-left: 3px solid var(--p); padding: 20px; border-radius: 8px; }
        .card h3 { font-family: 'Orbitron'; font-size: 0.5rem; color: #888; }
        .balance { font-size: 1.4rem; font-weight: 700; }

        /* Widget de Chat */
        #chat-trigger {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 20px var(--p); z-index: 100; transition: 0.3s;
        }
        #chat-trigger:hover { transform: scale(1.1); }

        #chat-window {
            position: fixed; bottom: 90px; right: 20px; width: 300px; height: 400px;
            background: #0a0a0a; border: 1px solid var(--p); border-radius: 15px;
            display: none; flex-direction: column; z-index: 100; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .chat-header { background: var(--p); color: black; padding: 10px; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.8rem; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .msg.bot { background: #1a1a1a; align-self: flex-start; border-left: 2px solid var(--p); }
        .msg.user { background: var(--p); color: black; align-self: flex-end; font-weight: 600; }

        .chat-input { display: flex; padding: 10px; background: #111; border-top: 1px solid #222; }
        .chat-input input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 0.8rem; }
        .chat-input button { background: transparent; border: none; color: var(--p); font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-small">CORAX<span>•</span>OS</div>
            <div class="wallet-info">ID: 0x71...C42D</div>
        </header>

        <div class="chart-box">
            <canvas id="liveChart"></canvas>
        </div>

        <div class="grid">
            <div class="card"><h3>SALDO CRX</h3><div class="balance">14.250</div></div>
            <div class="card"><h3>NETWORK</h3><div style="color: #4ade80; font-family: 'Orbitron'; font-size: 0.7rem;">● ONLINE</div></div>
        </div>
    </div>

    <!-- Interface do Chat -->
    <div id="chat-trigger" onclick="toggleChat()">💬</div>

    <div id="chat-window">
        <div class="chat-header">CORAX PROTOCOL ASSISTANT</div>
        <div id="chat-messages">
            <div class="msg bot">Olá! Sou o assistente CORAX. Como posso ajudar na sua transação hoje?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Digite sua dúvida...">
            <button onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
    <script>
        // Gráfico Animado
        const ctx = document.getElementById('liveChart').getContext('2d');
        let dataPoints = [40, 45, 42, 48, 50, 47, 52, 55, 53, 58];
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['', '', '', '', '', '', '', '', '', ''],
                datasets: [{
                    data: dataPoints, borderColor: '#9d4edd', borderWidth: 2, pointRadius: 0, fill: true,
                    backgroundColor: 'rgba(157, 78, 221, 0.1)', tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        setInterval(() => {
            dataPoints.shift(); dataPoints.push(Math.floor(Math.random() * (60 - 40 + 1)) + 40);
            chart.update();
        }, 2000);

        // Lógica do Chat
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-messages');
            if (!input.value) return;

            // Mensagem do Usuário
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.innerText = input.value;
            container.appendChild(userMsg);

            const text = input.value.toLowerCase();
            input.value = '';

            // Resposta Automática do Bot
            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = 'msg bot';
                
                if(text.includes('saldo')) botMsg.innerText = "Seu saldo atual é de 14.250 CRX. Todas as confirmações estão em dia.";
                else if(text.includes('taxa')) botMsg.innerText = "As taxas da rede CORAX estão em 0.0001 CRX por transação.";
                else if(text.includes('seguro')) botMsg.innerText = "Sim, o protocolo Corax utiliza criptografia quântica peer-to-peer.";
                else botMsg.innerText = "Entendi. Estou processando sua solicitação nos nós da rede. Deseja algo mais?";
                
                container.appendChild(botMsg);
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
