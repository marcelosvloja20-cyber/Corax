<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORΛX Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:#fff;
}

.wrapper{
max-width:430px;
margin:auto;
min-height:100vh;
padding:20px 20px 110px;
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.brand{
font-size:24px;
letter-spacing:6px;
font-weight:300;
}

.user{
width:42px;
height:42px;
border-radius:50%;
background:#a855f7;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 0 20px rgba(168,85,247,.45);
}

/* WALLET CARD */

.card{
background:linear-gradient(135deg,#111,#1b1b1b);
border-radius:26px;
padding:24px;
border:1px solid rgba(255,255,255,.08);
position:relative;
overflow:hidden;
box-shadow:0 0 30px rgba(168,85,247,.08);
}

.card::after{
content:"";
position:absolute;
width:180px;
height:180px;
background:rgba(168,85,247,.14);
border-radius:50%;
top:-70px;
right:-70px;
filter:blur(50px);
}

.label{
font-size:12px;
letter-spacing:2px;
color:#888;
}

.balance{
font-size:42px;
font-weight:700;
margin-top:10px;
}

.address{
margin-top:10px;
font-size:13px;
color:#bbb;
word-break:break-all;
}

.network{
margin-top:8px;
font-size:13px;
color:#a855f7;
}

/* ACTIONS */

.actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:20px;
}

.action{
background:#111;
border:1px solid rgba(255,255,255,.06);
border-radius:18px;
padding:16px 10px;
text-align:center;
font-size:12px;
cursor:pointer;
}

.action span{
display:block;
font-size:22px;
margin-bottom:8px;
}

/* INFO */

.box{
margin-top:22px;
background:#111;
border-radius:20px;
padding:18px;
border:1px solid rgba(255,255,255,.06);
}

.box h3{
font-size:16px;
margin-bottom:10px;
color:#a855f7;
}

.box p{
font-size:14px;
line-height:1.6;
color:#bbb;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:430px;
max-width:100%;
background:#0c0c0c;
border-top:1px solid rgba(255,255,255,.06);
display:grid;
grid-template-columns:repeat(4,1fr);
padding:14px 0;
}

.nav div{
text-align:center;
font-size:12px;
color:#777;
cursor:pointer;
}

.nav span{
display:block;
font-size:20px;
margin-bottom:6px;
}

.active{
color:#a855f7 !important;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="top">
<div class="brand">CORΛX</div>
<div class="user">C</div>
</div>

<div class="card">
<div class="label">TOTAL BALANCE</div>
<div class="balance" id="balance">0 ETH</div>
<div class="address" id="wallet">Conectando...</div>
<div class="network" id="network">Rede...</div>
</div>

<div class="actions">
<div class="action"><span>⬆️</span>Send</div>
<div class="action"><span>⬇️</span>Receive</div>
<div class="action" onclick="goStake()"><span>💰</span>Stake</div>
<div class="action" onclick="disconnectWallet()"><span>🚪</span>Exit</div>
</div>

<div class="box">
<h3>Money Without Borders</h3>
<p>
Sua carteira conectada ao ecossistema CORΛX. Transfira valor globalmente com liberdade financeira e infraestrutura multi-chain.
</p>
</div>

</div>

<div class="nav">
<div class="active" onclick="goHome()"><span>🏠</span>Home</div>
<div onclick="goStake()"><span>💰</span>Stake</div>
<div onclick="goHistory()"><span>📜</span>History</div>
<div onclick="goSettings()"><span>⚙️</span>Settings</div>
</div>

<script>
async function loadWallet(){

if(typeof window.ethereum === 'undefined'){
document.getElementById('wallet').innerText='Wallet não detectada';
return;
}

try{

const provider = new ethers.providers.Web3Provider(window.ethereum);

const accounts = await provider.listAccounts();

if(accounts.length === 0){
window.location.href='login.html';
return;
}

const signer = provider.getSigner();
const address = await signer.getAddress();

document.getElementById('wallet').innerText =
address.substring(0,6)+'...'+address.substring(address.length-4);

const balanceWei = await provider.getBalance(address);
const balanceEth = ethers.utils.formatEther(balanceWei);

document.getElementById('balance').innerText =
parseFloat(balanceEth).toFixed(4)+' ETH';

const network = await provider.getNetwork();

document.getElementById('network').innerText =
'Rede: ' + network.name;

}catch(error){
document.getElementById('wallet').innerText='Erro ao conectar';
}
}

function disconnectWallet(){
window.location.href='login.html';
}

function goHome(){
window.location.href='app.html';
}

function goStake(){
window.location.href='stake.html';
}

function goHistory(){
window.location.href='history.html';
}

function goSettings(){
window.location.href='settings.html';
}

loadWallet();
</script>

</body>
</html>
