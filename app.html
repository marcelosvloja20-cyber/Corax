<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Dashboard OS</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --green: #4ade80; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; padding-bottom: 100px; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(157, 78, 221, 0.2); margin-bottom: 25px; }
        .logo-small { font-family: 'Orbitron'; letter-spacing: 4px; color: var(--p); font-size: 1rem; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .settings-link { text-decoration: none; font-size: 1.2rem; }
        .wallet-info { background: var(--glass); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--p); font-size: 0.6rem; font-family: 'Orbitron'; }

        /* Container do Gráfico SVG (Nativo e Instantâneo) */
        .chart-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .chart-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .price { font-family: 'Orbitron'; font-size: 1.4rem; color: white; }
        .price span { color: var(--green); font-size: 0.8rem; margin-left: 10px; }

        /* Estilização da Linha do Gráfico */
        .svg-chart { width: 100%; height: 120px; stroke: var(--p); stroke-width: 3; fill: none; filter: drop-shadow(0 0 8px var(--p)); }
        
        /* Grid de Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--glass); border-left: 3px solid var(--p); padding: 15px; border-radius: 8px; text-decoration: none; }
        .card h3 { font-family: 'Orbitron'; font-size: 0.5rem; color: #888; letter-spacing: 2px; margin-bottom: 5px; }
        .balance { font-size: 1.2rem; font-weight: 700; color: white; }

        /* Caixa de Transferência */
        .send-box { background: var(--glass); border: 1px solid rgba(157, 78, 221, 0.2); padding: 20px; border-radius: 15px; }
        h4 { font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 15px; letter-spacing: 2px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 12px; border-radius: 5px; color: white; margin: 8px 0; outline: none; font-size: 0.8rem; }
        .btn-send { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 5px; color: black; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* Chat */
        #chat-trigger { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px var(--p); z-index: 100; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-small">CORAX<span>•</span>OS</div>
            <div class="nav-right">
                <a href="settings.html" class="settings-link">⚙️</a>
                <div class="wallet-info">0x71...C42D</div>
            </div>
        </header>

        <div class="chart-box">
            <div class="chart-header">
                <div class="price">$ 42.083,12 <span>+2.4%</span></div>
                <div style="font-size: 0.5rem; color: #444; font-family: 'Orbitron';">LIVE SVG DATA</div>
            </div>
            <!-- Gráfico SVG nativo para carregar instantaneamente -->
            <svg class="svg-chart" viewBox="0 0 400 100" preserveAspectRatio="none">
                <path id="graph-path" d="M0,80 Q50,20 100,50 T200,30 T300,70 T400,40" />
            </svg>
        </div>

        <div class="grid">
            <div class="card">
                <h3>SALDO CRX</h3>
                <div class="balance">14.250</div>
            </div>
            <a href="airdrop.html" class="card" style="border-color: var(--green); background: rgba(74, 222, 128, 0.05);">
                <h3 style="color: var(--green);">AIRDROP</h3>
                <div class="balance" style="font-size: 0.9rem;">COLETAR →</div>
            </a>
        </div>

        <div class="send-box">
            <h4>TRANSFERÊNCIA</h4>
            <input type="text" placeholder="Endereço de destino">
            <input type="number" placeholder="Valor CRX">
            <button class="btn-send" onclick="alert('Iniciando protocolo...')">ENVIAR AGORA</button>
        </div>
    </div>

    <div id="chat-trigger">💬</div>

    <script>
        // Animação do gráfico SVG sem bibliotecas externas
        function updateChart() {
            const path = document.getElementById('graph-path');
            let points = "M0," + (Math.random() * 80 + 10);
            for (let i = 1; i <= 4; i++) {
                points += " T" + (i * 100) + "," + (Math.random() * 80 + 10);
            }
            path.setAttribute('d', points);
        }
        
        // Atualiza a linha a cada 2 segundos
        setInterval(updateChart, 2000);
        updateChart(); // Inicia imediatamente
    </script>
</body>
</html>
