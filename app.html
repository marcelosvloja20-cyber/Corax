<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX | Dashboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --p: #9d4edd; /* Roxo Corax */
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.9);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'Orbitron', sans-serif;
        }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
        }

        /* BACKGROUND FIXO */
        .hero-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.95)), 
                        url('9a79db2d-571d-48b1-b270-0428e3dde4de.png');
            background-size: cover; background-position: center;
            z-index: -1; filter: brightness(0.6);
        }

        /* CONTAINER DE CONTEÚDO DINÂMICO */
        #content-area {
            height: calc(100vh - 70px);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ESTILO DO CARD DE SWAP (INJETADO) */
        .swap-container {
            background: var(--card);
            border: 1px solid rgba(157, 78, 221, 0.3);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .brand-header {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        h1 { font-size: 2.2rem; letter-spacing: 10px; }
        h1 span { color: var(--p); }

        /* NAVEGAÇÃO INFERIOR */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid rgba(157, 78, 221, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active {
            color: var(--p);
            text-shadow: 0 0 10px var(--p);
        }

        .nav-icon {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

    <div class="hero-background"></div>

    <!-- ÁREA ONDE O SWAP.HTML SERÁ MOSTRADO -->
    <div id="content-area">
        <div class="brand-header">
            <h1>COR<span>A</span>X</h1>
        </div>
        
        <!-- O conteúdo do swap.html entra aqui via JavaScript ou include -->
        <div id="router-view">
            <!-- Conteúdo inicial (Home) -->
            <p style="text-align: center; color: #888; font-size: 0.8rem; margin-top: 50px;">
                BEM-VINDO AO ECOSSISTEMA<br>
                <span style="color: var(--p);">AGUARDANDO CONEXÃO...</span>
            </p>
        </div>
    </div>

    <!-- MENU INFERIOR MOBILE -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="loadPage('home')">
            <span class="nav-icon">🏠</span>
            <span>Início</span>
        </a>
        <a href="#" class="nav-item" onclick="loadPage('swap')">
            <span class="nav-icon">🔄</span>
            <span>Swap</span>
        </a>
        <a href="#" class="nav-item" onclick="loadPage('wallet')">
            <span class="nav-icon">💳</span>
            <span>Wallet</span>
        </a>
    </nav>

    <script>
        // Função simples para simular troca de telas no celular
        function loadPage(page) {
            const view = document.getElementById('router-view');
            
            // Remove 'active' de todos
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // Adiciona no clicado
            event.currentTarget.classList.add('active');

            if(page === 'swap') {
                view.innerHTML = `
                    <div class="swap-container">
                        <h2 style="font-size: 0.8rem; margin-bottom: 15px; color: var(--p);">SWAP ASSETS</h2>
                        <input type="number" placeholder="0.0" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:8px; margin-bottom:10px;">
                        <div style="text-align:center; margin: 10px 0;">⇅</div>
                        <input type="number" placeholder="0.0" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:8px; margin-bottom:20px;">
                        <button style="width:100%; padding:15px; background:var(--p); border:none; border-radius:8px; font-weight:bold; letter-spacing:2px;">EXCHANGE</button>
                    </div>
                `;
            } else if (page === 'home') {
                view.innerHTML = '<p style="text-align: center; color: #888; font-size: 0.8rem; margin-top: 50px;">BEM-VINDO AO ECOSSISTEMA<br><span style="color: var(--p);">AGUARDANDO CONEXÃO...</span></p>';
            }
        }
    </script>

</body>
</html>
