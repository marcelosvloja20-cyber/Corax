<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Dashboard OS</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --green: #4ade80; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; padding-bottom: 100px; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(157, 78, 221, 0.2); margin-bottom: 25px; }
        .logo-small { font-family: 'Orbitron'; letter-spacing: 4px; color: var(--p); font-size: 1rem; text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 18px; }
        .nav-icon { text-decoration: none; font-size: 1.1rem; filter: drop-shadow(0 0 5px var(--p)); }

        /* Gráfico SVG */
        .chart-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .svg-chart { width: 100%; height: 100px; stroke: var(--p); stroke-width: 2; fill: none; }

        /* Dashboard Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--glass); border-left: 3px solid var(--p); padding: 15px; border-radius: 8px; text-decoration: none; }
        .balance { font-size: 1.1rem; font-weight: 700; color: white; }

        /* Caixa de Envio */
        .send-box { background: var(--glass); border: 1px solid rgba(157, 78, 221, 0.2); padding: 20px; border-radius: 15px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 12px; border-radius: 5px; color: white; margin: 8px 0; outline: none; }
        .btn-send { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 5px; color: black; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }

        /* MODAL DE COMPROVANTE (PASSO 4) */
        #modal-receipt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .receipt-card {
            background: #111; border: 1px solid var(--p); padding: 30px; width: 100%; max-width: 350px;
            text-align: center; border-radius: 10px; box-shadow: 0 0 30px var(--p);
        }
        .receipt-card h2 { font-family: 'Orbitron'; font-size: 1rem; color: var(--p); margin-bottom: 20px; }
        .receipt-data { text-align: left; font-size: 0.8rem; margin: 20px 0; border-top: 1px solid #222; padding-top: 15px; }
        .receipt-data p { margin: 10px 0; color: #888; }
        .receipt-data span { color: white; float: right; font-family: 'Orbitron'; }
        .btn-download { width: 100%; padding: 12px; background: var(--p); border: none; color: black; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-close { color: #555; background: none; border: none; margin-top: 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }

        /* Chat */
        #chat-trigger { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo-small">CORAX<span>•</span>OS</a>
            <div class="nav-right">
                <a href="notifications.html" class="nav-icon">🔔</a>
                <a href="history.html" class="nav-icon">🕒</a>
                <a href="settings.html" class="nav-icon">⚙️</a>
            </div>
        </header>

        <div class="chart-box">
            <svg class="svg-chart" viewBox="0 0 400 100" preserveAspectRatio="none"><path id="gl" d="M0,80 Q50,20 100,50 T400,40" /></svg>
        </div>

        <div class="grid">
            <div class="card"><h3>SALDO</h3><div class="balance">14.250 CRX</div></div>
            <a href="stake.html" class="card"><h3>STAKING</h3><div class="balance" style="font-size:0.8rem">18.5% APY</div></a>
        </div>

        <div class="send-box">
            <h4>TRANSFERÊNCIA</h4>
            <input type="text" id="dest-addr" placeholder="Destinatário 0x...">
            <input type="number" id="dest-val" placeholder="Valor CRX">
            <button class="btn-send" onclick="simulateSend()">ENVIAR AGORA</button>
        </div>
    </div>

    <!-- MODAL DO COMPROVANTE -->
    <div id="modal-receipt">
        <div class="receipt-card" id="capture-area">
            <h2>CORAX RECEIPT</h2>
            <div class="receipt-data">
                <p>STATUS: <span style="color:#4ade80">SUCCESS</span></p>
                <p>VALOR: <span id="r-val">0.00 CRX</span></p>
                <p>PARA: <span id="r-addr">0x...</span></p>
                <p>BLOCK: <span>#842.109</span></p>
                <p>NETWORK: <span>MAINNET</span></p>
            </div>
            <button class="btn-download" onclick="downloadReceipt()">SALVAR NO CELULAR</button>
            <button class="btn-close" onclick="closeModal()">FECHAR</button>
        </div>
    </div>

    <div id="chat-trigger">💬</div>

    <!-- BIBLIOTECA PARA CAPTURA DE IMAGEM -->
    <script src="https://hertzen.com"></script>
    <script>
        function simulateSend() {
            const addr = document.getElementById('dest-addr').value;
            const val = document.getElementById('dest-val').value;
            if(!addr || !val) return alert("Preencha os dados!");

            document.getElementById('r-val').innerText = val + " CRX";
            document.getElementById('r-addr').innerText = addr.substring(0,6) + "...";
            document.getElementById('modal-receipt').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-receipt').style.display = 'none'; }

        function downloadReceipt() {
            const area = document.getElementById('capture-area');
            html2canvas(area).then(canvas => {
                const link = document.createElement('a');
                link.download = 'comprovante-corax.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Animação Gráfico
        setInterval(() => {
            const l = document.getElementById('gl');
            let d = "M0," + (Math.random()*60+20) + " T100," + (Math.random()*60+20) + " T400,50";
            l.setAttribute('d', d);
        }, 3000);
    </script>
</body>
</html>
