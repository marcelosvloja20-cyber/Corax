<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Dashboard Live</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(157, 78, 221, 0.2); margin-bottom: 25px; }
        .logo-small { font-family: 'Orbitron'; letter-spacing: 4px; color: var(--p); font-size: 1rem; }
        .wallet-info { background: var(--glass); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--p); font-size: 0.6rem; font-family: 'Orbitron'; }

        /* Gráfico Live */
        .chart-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 20px; position: relative; }
        .chart-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .price { font-family: 'Orbitron'; font-size: 1.5rem; color: white; }
        .price span { color: #4ade80; font-size: 0.8rem; margin-left: 10px; }
        canvas { width: 100% !important; height: 150px !important; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--glass); border-left: 3px solid var(--p); padding: 20px; border-radius: 8px; }
        .card h3 { font-family: 'Orbitron'; font-size: 0.5rem; color: #888; letter-spacing: 2px; margin-bottom: 5px; }
        .balance { font-size: 1.4rem; font-weight: 700; }

        .send-box { background: var(--glass); border: 1px solid rgba(157, 78, 221, 0.2); padding: 20px; border-radius: 15px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 12px; border-radius: 5px; color: white; margin: 8px 0; outline: none; font-size: 0.8rem; }
        .btn-send { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 5px; color: black; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        #status-msg { margin-top: 10px; font-size: 0.7rem; text-align: center; font-family: 'Orbitron'; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-small">CORAX<span>•</span>OS</div>
            <div class="wallet-info">ID: 0x71...C42D</div>
        </header>

        <!-- Seção do Gráfico -->
        <div class="chart-box">
            <div class="chart-header">
                <div class="price">$ 42.083,12 <span id="percent">+2.4%</span></div>
                <div style="font-size: 0.6rem; color: #444; font-family: 'Orbitron';">LIVE MARKET DATA</div>
            </div>
            <canvas id="liveChart"></canvas>
        </div>

        <div class="grid">
            <div class="card">
                <h3>SALDO CRX</h3>
                <div class="balance" id="main-balance">14.250</div>
            </div>
            <div class="card">
                <h3>NETWORK</h3>
                <div style="color: #4ade80; font-family: 'Orbitron'; font-size: 0.7rem;">● ONLINE</div>
            </div>
        </div>

        <div class="send-box">
            <input type="text" id="address" placeholder="Endereço de destino">
            <input type="number" id="amount" placeholder="Valor CRX">
            <button class="btn-send" onclick="sendTransaction()">EXECUTAR TRANSFERÊNCIA</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
    <script>
        // Configuração do Gráfico Animado
        const ctx = document.getElementById('liveChart').getContext('2d');
        let dataPoints = [40, 42, 41, 44, 43, 46, 45, 48, 47, 50];
        
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['', '', '', '', '', '', '', '', '', ''],
                datasets: [{
                    label: 'Preço CRX',
                    data: dataPoints,
                    borderColor: '#9d4edd',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(157, 78, 221, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { display: false }, x: { display: false } },
                plugins: { legend: { display: false } }
            }
        });

        // Simulação de movimento do mercado
        setInterval(() => {
            dataPoints.shift();
            dataPoints.push(Math.floor(Math.random() * (55 - 40 + 1)) + 40);
            chart.update();
        }, 2000);

        function sendTransaction() {
            const msg = document.getElementById('status-msg');
            msg.style.display = 'block';
            msg.style.color = '#9d4edd';
            msg.innerHTML = "VALIDANDO PROTOCOLO...";
            setTimeout(() => {
                msg.style.color = '#4ade80';
                msg.innerHTML = "TRANSAÇÃO TRANSMITIDA!";
            }, 2000);
        }
    </script>
</body>
</html>
