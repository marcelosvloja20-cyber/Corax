<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Pagamentos Descentralizados</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --corax-purple: #9d4edd;
            --corax-glow: rgba(157, 78, 221, 0.4);
            --text-main: #ffffff;
            --text-dim: #888888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .bg-light {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--corax-glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
        }
        header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 5px;
            font-size: 1.2rem;
        }
        .logo-text span { color: var(--corax-purple); }
        .status {
            font-size: 0.6rem;
            color: #4ade80;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 7px; height: 7px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .logo-main {
            width: 260px;
            max-width: 70%;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 25px var(--corax-glow));
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        h1 span { color: var(--corax-purple); }
        .slogan {
            color: var(--text-dim);
            letter-spacing: 6px;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 50px;
        }
        .actions { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 15px 35px;
            border-radius: 2px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            text-decoration: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .btn-primary {
            background: var(--corax-purple);
            color: black;
            border: none;
            box-shadow: 0 0 15px var(--corax-glow);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        footer {
            padding: 30px;
            text-align: center;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="bg-light"></div>
    <header>
        <div class="logo-text">COR<span>A</span>X</div>
        <div class="status"><div class="dot"></div> Mainnet Online</div>
    </header>
    <main>
        <img id="mainLogo" src="logo.png" alt="Corax Logo" class="logo-main">
        <h1>COR<span>A</span>X</h1>
        <p class="slogan">Pagamentos Descentralizados</p>
        <div class="actions">
            <a href="#" class="btn btn-primary">Launch App</a>
            <a href="#" class="btn btn-secondary">Documentation</a>
        </div>
    </main>
    <footer>&copy; 2026 CORAX ECOSYSTEM | SECURED BY BLOCKCHAIN</footer>

    <script>
        // Script para garantir que a imagem carregue idependente da pasta
        const img = document.getElementById('mainLogo');
        img.onerror = function() {
            if (this.src.includes('assets/')) {
                this.src = 'logo.png'; // Tenta na raiz
            } else if (!this.src.includes('placeholder')) {
                this.src = 'https://githubusercontent.com'; // Tenta link direto do seu GitHub
            }
        };
        // Tenta primeiro no caminho que você tinha
        img.src = 'assets/logo.png';
    </script>
</body>
</html>
