<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX | Pagamentos Descentralizados</title>
    
    <!-- INFRAESTRUTURA PWA (PASSO 1) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9d4edd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="9a79db2d-571d-48b1-b270-0428e3dde4de.png">

    <!-- FONTES E ESTILOS -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --p: #9d4edd;
            --bg: #050505;
            --glow: rgba(157, 78, 221, 0.3);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            overflow: hidden;
        }

        /* Efeito de Luz Profunda */
        .bg-gradient {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(157, 78, 221, 0.12) 0%, transparent 70%);
            z-index: -1;
        }

        /* Logo com Animação Fluida */
        .logo-container {
            width: 300px;
            max-width: 85%;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px var(--glow));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        /* Botão de Alta Conversão */
        .btn-launch { 
            padding: 20px 60px; 
            background: var(--p); 
            color: #000; 
            text-decoration: none; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: bold; 
            font-size: 0.85rem; 
            letter-spacing: 5px; 
            border-radius: 4px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 30px var(--glow); 
            text-transform: uppercase;
            margin-bottom: 80px;
        }

        .btn-launch:active { 
            transform: scale(0.95); 
            box-shadow: 0 0 50px var(--p); 
        }

        /* Footer Estruturado */
        footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            color: #333;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        footer a {
            color: var(--p);
            text-decoration: none;
            margin-left: 15px;
            transition: 0.3s;
            border-bottom: 1px solid transparent;
        }

        footer a:hover {
            color: white;
            border-bottom: 1px solid var(--p);
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <div class="logo-container">
        <!-- Caminho da imagem confirmado pelo seu repositório -->
        <img src="9a79db2d-571d-48b1-b270-0428e3dde4de.png" alt="CORAX OFFICIAL">
    </div>
    
    <!-- Início do Fluxo: Vai para o Login de Segurança -->
    <a href="login.html" class="btn-launch">LAUNCH APP</a>

    <footer>
        &copy; 2026 CORAX ECOSYSTEM | <a href="about.html">SAIBA MAIS</a>
    </footer>

    <!-- LOGICA DE ATIVAÇÃO PWA -->
    <script>
        // Registra o Service Worker (necessário para ser instalável)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Corax PWA Ativo'))
                    .catch(err => console.log('Erro PWA:', err));
            });
        }
    </script>

</body>
</html>
