<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX |Receba e envie pagamentos globais em segundos, sem bancos. </title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --p: #9d4edd; 
            --bg: #000000; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--bg);
            overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* 🌌 Brilho Atmosférico */
        .glow {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.18) 0%, transparent 70%);
            z-index: 1;
        }

        /* 🦅 O SÍMBOLO (Agora como herói da página) */
        .brand-symbol {
            position: relative;
            z-index: 10;
            width: 85vw; 
            max-width: 500px;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(157, 78, 221, 0.4));
        }

        .brand-symbol img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 🖋️ Identidade Visual */
        .branding {
            text-align: center;
            z-index: 20;
            margin-top: 10px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            letter-spacing: 15px;
            color: white;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
        }

        h1 span { color: var(--p); text-shadow: 0 0 20px var(--p); }

        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* 🚀 Botão Launch */
        .action {
            margin-top: 60px;
            z-index: 30;
        }

        .btn-launch {
            padding: 20px 60px;
            background: var(--p);
            color: #000;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 4px;
            border-radius: 4px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.4);
            text-transform: uppercase;
            display: inline-block;
        }

        .btn-launch:active {
            transform: scale(0.95);
            box-shadow: 0 0 60px var(--p);
        }

        /* 🎬 Animação de Flutuação */
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1) rotate(-1deg); }
            50% { transform: translateY(-30px) scale(1.05) rotate(1deg); }
        }

    </style>
</head>
<body>

    <div class="glow"></div>

    <!-- CORVO GIGANTE (Link para um Corvo PNG transparente de alta qualidade) -->
    <div class="brand-symbol">
        <img src="https://pngarts.com" alt="CORAX Symbol">
    </div>

    <!-- TEXTO DA MARCA -->
    <div class="branding">
        <h1>COR<span>A</span>X</h1>
        <p class="tagline">Pagamentos descentralizados</p>
    </div>

    <!-- BOTÃO -->
    <div class="action">
        <a href="app.html" class="btn-launch">Launch App</a>
    </div>

</body>
</html>
