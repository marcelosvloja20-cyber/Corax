<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX | Pagamentos Descentralizados</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --p: #9d4edd; 
            --bg: #000000; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--bg);
            overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* 🌌 Brilho de fundo para profundidade */
        .glow {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.15) 0%, transparent 70%);
            z-index: 1;
        }

        /* 🦅 O SÍMBOLO (Ajustado para expansão total) */
        .brand-symbol {
            position: relative;
            z-index: 10;
            width: 120vw; /* Faz o corvo transbordar um pouco a tela para parecer gigante */
            max-width: 600px;
            margin-bottom: -60px; /* Puxa o texto para cima do corvo */
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 0 50px rgba(157, 78, 221, 0.2));
        }

        .brand-symbol img {
            width: 100%;
            height: auto;
            /* O segredo: mix-blend remove o fundo preto da sua imagem */
            mix-blend-mode: lighten; 
            display: block;
        }

        /* 🖋️ Branding */
        .branding {
            text-align: center;
            z-index: 20;
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.8rem;
            letter-spacing: 15px;
            color: white;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(157, 78, 221, 0.6);
        }

        h1 span { color: var(--p); }

        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* 🚀 Botão */
        .action {
            margin-top: 60px;
            z-index: 30;
        }

        .btn-launch {
            padding: 20px 60px;
            background: var(--p);
            color: #000;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 4px;
            border-radius: 4px;
            transition: 0.4s;
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.4);
            text-transform: uppercase;
        }

        /* 🎬 Animação */
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

    </style>
</head>
<body>

    <div class="glow"></div>

    <!-- CORVO GIGANTE -->
    <div class="brand-symbol">
        <img src="9a79db2d-571d-48b1-b270-0428e3dde4de.png" alt="Corax">
    </div>

    <!-- TEXTO -->
    <div class="branding">
        <h1>COR<span>A</span>X</h1>
        <p class="tagline">Pagamentos descentralizados</p>
    </div>

    <!-- BOTÃO -->
    <div class="action">
        <a href="app.html" class="btn-launch">Launch App</a>
    </div>

</body>
</html>
