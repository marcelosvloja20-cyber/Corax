<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Pagamentos Descentralizados</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        .glow { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at center, rgba(157,78,221,0.15) 0%, transparent 70%); 
            z-index: -1; 
        }
        .logo-main { 
            width: 250px; 
            max-width: 80%; 
            filter: drop-shadow(0 0 20px rgba(157,78,221,0.5)); 
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; letter-spacing: 10px; margin-bottom: 10px; text-transform: uppercase; }
        h1 span { color: var(--p); }
        .slogan { color: #888; letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 40px; }
        .btn { 
            padding: 15px 40px; 
            background: var(--p); 
            color: black; 
            text-decoration: none; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: bold; 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
            border-radius: 4px; 
            transition: 0.3s; 
            box-shadow: 0 0 20px rgba(157,78,221,0.4); 
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 0 40px var(--p); }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <!-- NOME DO ARQUIVO ATUALIZADO CONFORME SEU PRINT -->
    <img src="9a79db2d-571d-48b1-b270-0428e3dde4de.png" class="logo-main" alt="CORAX">
    
    <h1>COR<span>A</span>X</h1>
    <p class="slogan">Pagamentos Descentralizados</p>
    
    <a href="#" class="btn">LAUNCH APP</a>
</body>
</html>
