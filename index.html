<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Pagamentos Descentralizados</title>
    <!-- Fontes Modernas -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --p: #9d4edd;
            --bg: #050505;
            --glow: rgba(157, 78, 221, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            overflow-x: hidden;
        }

        /* Efeito de Luz no Fundo */
        .bg-gradient {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(157, 78, 221, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        /* Logo Container */
        .logo-container {
            width: 300px;
            max-width: 85%;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px var(--glow));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        /* Botão Principal */
        .btn-launch { 
            padding: 18px 50px; 
            background: var(--p); 
            color: #000; 
            text-decoration: none; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: bold; 
            font-size: 0.8rem; 
            letter-spacing: 4px; 
            border-radius: 4px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 25px var(--glow); 
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        .btn-launch:hover { 
            transform: scale(1.1); 
            box-shadow: 0 0 45px var(--p); 
        }

        /* Rodapé com Link Sobre */
        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            color: #444;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        footer a {
            color: var(--p);
            text-decoration: none;
            margin-left: 10px;
            transition: 0.3s;
        }

        footer a:hover {
            color: white;
            text-shadow: 0 0 10px var(--p);
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <div class="logo-container">
        <!-- Mantendo o nome do arquivo que funcionou no seu projeto -->
        <img src="9a79db2d-571d-48b1-b270-0428e3dde4de.png" alt="CORAX Official">
    </div>
    
    <!-- Link corrigido para ir primeiro para o login de segurança -->
    <a href="login.html" class="btn-launch">LAUNCH APP</a>

    <footer>
        &copy; 2026 CORAX ECOSYSTEM | <a href="about.html">SAIBA MAIS</a>
    </footer>

</body>
</html>
