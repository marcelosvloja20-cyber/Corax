<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORAX | Pagamentos Descentralizados</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --p: #9d4edd; /* Roxo Corax */
            --bg: #050505; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 🌌 Brilho Atmosférico ao fundo */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120vw;
            height: 120vh;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.12) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* 🦅 Símbolo Icônico (O Corvo) */
        .brand-symbol {
            position: relative;
            z-index: 10;
            width: 90vw; /* Expansão quase total no mobile */
            max-width: 550px; /* Limite para desktop */
            filter: drop-shadow(0 0 40px rgba(157, 78, 221, 0.3));
            animation: floatSymbol 6s ease-in-out infinite;
        }

        .brand-symbol img {
            width: 100%;
            height: auto;
            /* Remove o fundo preto da imagem se houver, deixando o corvo "solto" */
            mix-blend-mode: screen; 
            display: block;
        }

        /* 🖋️ Identidade Visual */
        .branding {
            text-align: center;
            z-index: 20;
            margin-top: -30px; /* Ajuste para o texto ficar "colado" à base do corvo */
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            letter-spacing: 15px;
            color: white;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
        }

        h1 span { color: var(--p); }

        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* 🚀 Botão de Acesso */
        .action-area {
            margin-top: 60px;
            z-index: 20;
        }

        .btn-launch {
            padding: 20px 60px;
            background: var(--p);
            color: #000;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 4px;
            border-radius: 4px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.4);
            text-transform: uppercase;
        }

        .btn-launch:active {
            transform: scale(0.94);
            box-shadow: 0 0 60px var(--p);
        }

        /* 🎬 Animação de Flutuação */
        @keyframes floatSymbol {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(1deg); }
        }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <!-- Símbolo Central -->
    <div class="brand-symbol">
        <img src="9a79db2d-571d-48b1-b270-0428e3dde4de.png" alt="Corax Symbol">
    </div>

    <!-- Identidade -->
    <div class="branding">
        <h1>COR<span>A</span>X</h1>
        <p class="tagline">Pagamentos descentralizados</p>
    </div>

    <!-- Entrada do Aplicativo -->
    <div class="action-area">
        <a href="app.html" class="btn-launch">Launch App</a>
    </div>

</body>
</html>
