<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Secure Access</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        /* Efeito de Brilho de Fundo */
        .bg-glow {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(157, 78, 221, 0.08) 0%, transparent 70%);
            z-index: -1;
        }

        .lock-icon { 
            font-size: 2.5rem; 
            color: var(--p); 
            margin-bottom: 15px; 
            filter: drop-shadow(0 0 10px var(--p)); 
        }

        h2 { 
            font-size: 0.75rem; 
            letter-spacing: 4px; 
            margin-bottom: 40px; 
            color: #888; 
            text-transform: uppercase;
        }
        
        /* Indicadores de PIN */
        .pin-dots { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 50px; 
        }
        .dot { 
            width: 14px; 
            height: 14px; 
            border: 2px solid #333; 
            border-radius: 50%; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .dot.active { 
            background: var(--p); 
            border-color: var(--p); 
            box-shadow: 0 0 15px var(--p); 
            transform: scale(1.2);
        }

        /* Teclado Numérico */
        .keypad { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }
        .key { 
            width: 75px; 
            height: 75px; 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(157,78,221,0.1); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.4rem; 
            cursor: pointer; 
            transition: 0.2s;
            user-select: none;
        }
        .key:active { 
            background: var(--p); 
            color: black; 
            transform: scale(0.9); 
            box-shadow: 0 0 20px var(--p);
        }
        
        #error-msg { 
            position: absolute;
            bottom: 10%;
            color: #ff4d4d; 
            font-size: 0.6rem; 
            letter-spacing: 2px; 
            display: none; 
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="lock-icon">🔒</div>
    <h2>Autenticação Corax</h2>

    <div class="pin-dots">
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
        <div class="dot" id="d4"></div>
    </div>

    <div class="keypad">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div style="opacity: 0; pointer-events: none;"></div>
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="del()">←</div>
    </div>

    <div id="error-msg">ACESSO NEGADO: PIN INVÁLIDO</div>

    <script>
        let pin = "";
        const correctPin = "1234"; // PIN de acesso padrão

        function press(num) {
            if (pin.length < 4) {
                pin += num;
                document.getElementById(`d${pin.length}`).classList.add('active');
            }
            
            // Verificação automática ao atingir 4 dígitos
            if (pin.length === 4) {
                if (pin === correctPin) {
                    // Redireciona para a geração de semente de segurança
                    window.location.href = "seed.html";
                } else {
                    showError();
                    setTimeout(resetPin, 1000);
                }
            }
        }

        function del() {
            if (pin.length > 0) {
                document.getElementById(`d${pin.length}`).classList.remove('active');
                pin = pin.slice(0, -1);
            }
        }

        function showError() {
            const msg = document.getElementById('error-msg');
            msg.style.display = 'block';
        }

        function resetPin() {
            pin = "";
            for(let i=1; i<=4; i++) {
                document.getElementById(`d${i}`).classList.remove('active');
            }
            document.getElementById('error-msg').style.display = 'none';
        }
    </script>
</body>
</html>
