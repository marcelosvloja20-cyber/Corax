<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORAX Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
}

/* BG */

.glow{
position:absolute;
width:420px;
height:420px;
background:rgba(168,85,247,.16);
border-radius:50%;
filter:blur(120px);
animation:pulse 7s infinite ease-in-out;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

/* CARD */

.card{
position:relative;
z-index:2;
width:100%;
max-width:420px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
border-radius:28px;
padding:32px 24px;
box-shadow:0 0 40px rgba(168,85,247,.08);
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(35px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* HEADER */

.logo{
font-size:72px;
text-align:center;
filter:drop-shadow(0 0 22px rgba(168,85,247,.55));
}

.brand{
text-align:center;
margin-top:10px;
font-size:34px;
letter-spacing:10px;
font-weight:300;
}

.sub{
text-align:center;
margin-top:8px;
font-size:14px;
color:#aaa;
}

/* FORM */

.form{
margin-top:26px;
display:grid;
gap:14px;
}

.input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#111;
color:#fff;
outline:none;
border:1px solid rgba(255,255,255,.06);
font-size:15px;
}

.input:focus{
border-color:#a855f7;
}

.row{
display:flex;
justify-content:space-between;
font-size:13px;
color:#888;
padding:2px 2px 0;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-weight:700;
letter-spacing:4px;
cursor:pointer;
transition:.3s;
font-size:14px;
}

.primary{
background:#a855f7;
color:#fff;
box-shadow:0 0 24px rgba(168,85,247,.35);
}

.primary:hover{
transform:translateY(-3px);
box-shadow:0 0 35px rgba(168,85,247,.55);
}

.secondary{
background:#111;
border:1px solid rgba(255,255,255,.08);
color:#fff;
}

.secondary:hover{
border-color:#a855f7;
}

/* FOOT */

.foot{
margin-top:20px;
text-align:center;
font-size:13px;
color:#888;
}

.foot a{
color:#a855f7;
text-decoration:none;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">

<div class="logo">🐦‍⬛</div>
<h1 class="brand">CORAX</h1>
<p class="sub">Acesse sua conta segura</p>

<div class="form">

<input type="email" class="input" placeholder="Email">
<input type="password" class="input" placeholder="Senha">

<div class="row">
<span>Lembrar login</span>
<span>Esqueceu?</span>
</div>

<button class="btn primary" onclick="login()">ENTRAR</button>

<button class="btn secondary" onclick="wallet()">
CONECTAR WALLET
</button>

</div>

<div class="foot">
Não possui conta? <a href="#">Criar agora</a>
</div>

</div>

<script>
function login(){
window.location.href='app.html';
}

function wallet(){
alert('Wallet Connect em breve.');
}
</script>

</body>
</html>
