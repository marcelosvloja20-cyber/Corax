<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORΛX Login</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
}

.glow{
position:absolute;
width:420px;
height:420px;
background:rgba(168,85,247,.16);
border-radius:50%;
filter:blur(120px);
animation:pulse 7s infinite ease-in-out;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

.card{
position:relative;
z-index:2;
width:100%;
max-width:420px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
border-radius:28px;
padding:32px 24px;
box-shadow:0 0 40px rgba(168,85,247,.08);
}

.logo{
font-size:72px;
text-align:center;
filter:drop-shadow(0 0 22px rgba(168,85,247,.55));
}

.brand{
text-align:center;
margin-top:10px;
font-size:34px;
letter-spacing:10px;
font-weight:300;
}

.sub{
text-align:center;
margin-top:8px;
font-size:14px;
color:#aaa;
}

.form{
margin-top:26px;
display:grid;
gap:14px;
}

.input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#111;
color:#fff;
outline:none;
border:1px solid rgba(255,255,255,.06);
font-size:15px;
}

.input:focus{
border-color:#a855f7;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-weight:700;
letter-spacing:4px;
cursor:pointer;
transition:.3s;
font-size:14px;
}

.primary{
background:#a855f7;
color:#fff;
box-shadow:0 0 24px rgba(168,85,247,.35);
}

.primary:hover{
transform:translateY(-3px);
}

.secondary{
background:#111;
border:1px solid rgba(255,255,255,.08);
color:#fff;
}

.secondary:hover{
border-color:#a855f7;
}

.wallet-box{
margin-top:12px;
font-size:13px;
color:#999;
text-align:center;
word-break:break-all;
}

.foot{
margin-top:20px;
text-align:center;
font-size:13px;
color:#888;
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="card">

<div class="logo">🐦‍⬛</div>
<h1 class="brand">CORΛX</h1>
<p class="sub">Money Without Borders</p>

<div class="form">

<input type="email" class="input" placeholder="Email">
<input type="password" class="input" placeholder="Senha">

<button class="btn primary" onclick="login()">
ENTRAR
</button>

<button class="btn secondary" onclick="connectWallet()">
CONNECT WALLET
</button>

<div class="wallet-box" id="walletStatus">
Nenhuma wallet conectada
</div>

</div>

<div class="foot">
Acesso seguro multi-chain
</div>

</div>

<script>
async function connectWallet(){

if(typeof window.ethereum === 'undefined'){
alert('MetaMask não encontrada.');
return;
}

try{
await ethereum.request({
method:'eth_requestAccounts'
});

const provider = new ethers.providers.Web3Provider(window.ethereum);
const signer = provider.getSigner();
const address = await signer.getAddress();

document.getElementById('walletStatus').innerText =
'Wallet: ' +
address.substring(0,6) +
'...' +
address.substring(address.length-4);

setTimeout(()=>{
window.location.href='app.html';
},1200);

}catch(error){
alert('Conexão cancelada.');
}
}

function login(){
window.location.href='app.html';
}
</script>

</body>
</html>
