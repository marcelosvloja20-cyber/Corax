<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Shadow Swap</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; --glass: rgba(157, 78, 221, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .container { max-width: 450px; width: 100%; }
        .back-link { position: absolute; top: 20px; left: 20px; color: var(--p); text-decoration: none; font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px; }

        h1 { font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 30px; text-align: center; }

        /* Caixa de Swap */
        .swap-card { background: var(--glass); border: 1px solid rgba(157, 78, 221, 0.2); padding: 25px; border-radius: 20px; position: relative; }
        
        .token-input { background: rgba(0,0,0,0.5); border: 1px solid #222; padding: 20px; border-radius: 12px; margin-bottom: 10px; position: relative; }
        .token-input label { display: block; font-family: 'Orbitron'; font-size: 0.6rem; color: #555; margin-bottom: 10px; }
        .token-input input { background: transparent; border: none; color: white; font-size: 1.5rem; width: 70%; outline: none; font-weight: bold; }
        .token-select { position: absolute; right: 20px; top: 40px; font-family: 'Orbitron'; font-weight: bold; color: var(--p); }

        .swap-icon { 
            width: 40px; height: 40px; background: var(--bg); border: 1px solid var(--p); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: -20px auto; position: relative; z-index: 2; cursor: pointer; transition: 0.3s;
        }
        .swap-icon:hover { transform: rotate(180deg); background: var(--p); color: black; }

        /* Infos de Taxa */
        .swap-details { margin-top: 20px; font-size: 0.7rem; color: #555; font-family: 'Orbitron'; line-height: 1.8; }
        .swap-details span { float: right; color: white; }

        .btn-swap { 
            width: 100%; padding: 18px; background: var(--p); border: none; border-radius: 8px; 
            color: black; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; 
            margin-top: 25px; transition: 0.3s; letter-spacing: 2px;
        }
        .btn-swap:hover { box-shadow: 0 0 30px var(--p); transform: scale(1.02); }
    </style>
</head>
<body>

    <a href="app.html" class="back-link">← VOLTAR</a>

    <div class="container">
        <h1>SHADOW SWAP</h1>

        <div class="swap-card">
            <!-- Token 1 -->
            <div class="token-input">
                <label>VOCÊ ENVIA (ESTIMADO)</label>
                <input type="number" id="send-amt" placeholder="0.0" oninput="calcSwap()">
                <div class="token-select">ETH</div>
            </div>

            <div class="swap-icon">↓</div>

            <!-- Token 2 -->
            <div class="token-input" style="margin-top: 10px;">
                <label>VOCÊ RECEBE</label>
                <input type="number" id="receive-amt" placeholder="0.0" readonly>
                <div class="token-select" style="color: white;">CRX</div>
            </div>

            <div class="swap-details">
                <p>TAXA DE TROCA (1%): <span id="fee-val">0.00 ETH</span></p>
                <p>PREÇO: <span>1 ETH = 2.450 CRX</span></p>
                <p>SLIPPAGE: <span>0.5%</span></p>
            </div>

            <button class="btn-swap" onclick="executeSwap()">EXECUTAR SWAP</button>
        </div>
    </div>

    <script>
        const rate = 2450; // Preço de troca
        const feePercent = 0.01; // Sua taxa de lucro (1%)

        function calcSwap() {
            const send = document.getElementById('send-amt').value;
            const receive = document.getElementById('receive-amt');
            const feeDisplay = document.getElementById('fee-val');

            if(send > 0) {
                const fee = send * feePercent;
                const netSend = send - fee;
                const totalReceive = netSend * rate;
                
                receive.value = totalReceive.toFixed(2);
                feeDisplay.innerText = fee.toFixed(4) + " ETH";
            } else {
                receive.value = "";
                feeDisplay.innerText = "0.00 ETH";
            }
        }

        function executeSwap() {
            const amt = document.getElementById('send-amt').value;
            if(amt > 0) {
                alert("Protocolo Shadow-Swap iniciado na rede Base L2. Verifique sua carteira em instantes.");
                window.location.href = "app.html";
            } else {
                alert("Insira um valor para trocar.");
            }
        }
    </script>
</body>
</html>
