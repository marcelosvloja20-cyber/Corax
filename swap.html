<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORΛX Swap</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#050505;
color:#fff;
}

.wrapper{
max-width:430px;
margin:auto;
min-height:100vh;
padding:20px 20px 110px;
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.brand{
font-size:24px;
letter-spacing:6px;
font-weight:300;
}

.user{
width:42px;
height:42px;
border-radius:50%;
background:#a855f7;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
box-shadow:0 0 20px rgba(168,85,247,.45);
}

/* HERO */

.hero{
background:linear-gradient(135deg,#111,#1a1a1a);
border-radius:26px;
padding:24px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 30px rgba(168,85,247,.08);
position:relative;
overflow:hidden;
}

.hero::after{
content:"";
position:absolute;
width:180px;
height:180px;
background:rgba(168,85,247,.12);
border-radius:50%;
top:-70px;
right:-70px;
filter:blur(50px);
}

.hero small{
color:#888;
letter-spacing:2px;
}

.hero h1{
font-size:34px;
margin-top:10px;
}

.hero p{
margin-top:8px;
font-size:14px;
color:#bbb;
line-height:1.6;
}

/* FORM */

.box{
margin-top:24px;
background:#111;
border-radius:22px;
padding:20px;
border:1px solid rgba(255,255,255,.06);
}

.label{
font-size:13px;
color:#888;
margin-bottom:10px;
}

.select,
.input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:14px;
background:#0a0a0a;
color:#fff;
font-size:15px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.05);
}

.switch{
text-align:center;
font-size:26px;
color:#a855f7;
margin:8px 0;
cursor:pointer;
}

.rate{
font-size:14px;
color:#bbb;
margin-top:6px;
line-height:1.6;
}

.btn{
margin-top:18px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#a855f7;
color:#fff;
font-weight:700;
letter-spacing:3px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 24px rgba(168,85,247,.45);
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:430px;
max-width:100%;
background:#0c0c0c;
border-top:1px solid rgba(255,255,255,.06);
display:grid;
grid-template-columns:repeat(4,1fr);
padding:14px 0;
}

.nav div{
text-align:center;
font-size:12px;
color:#777;
cursor:pointer;
}

.nav span{
display:block;
font-size:20px;
margin-bottom:6px;
}

.active{
color:#a855f7 !important;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="top">
<div class="brand">CORΛX</div>
<div class="user">C</div>
</div>

<div class="hero">
<small>MULTI-CHAIN EXCHANGE</small>
<h1>Instant Swap</h1>
<p>
Troque ativos digitais com velocidade, liquidez e baixas taxas dentro do ecossistema CORΛX.
</p>
</div>

<div class="box">

<div class="label">From</div>

<select class="select" id="fromToken">
<option>USDT</option>
<option>USDC</option>
<option>ETH</option>
<option>BNB</option>
<option>MATIC</option>
</select>

<input type="number" class="input" id="amount" placeholder="0.00" oninput="calcSwap()">

<div class="switch" onclick="reverseSwap()">⇅</div>

<div class="label">To</div>

<select class="select" id="toToken" onchange="calcSwap()">
<option>ETH</option>
<option>USDT</option>
<option>USDC</option>
<option>BNB</option>
<option>MATIC</option>
</select>

<input type="text" class="input" id="receive" placeholder="0.00" readonly>

<div class="rate" id="rate">
1 USDT ≈ 0.00031 ETH
</div>

<div class="rate">
CORΛX Fee: 0.15%
</div>

<button class="btn" onclick="swapNow()">
SWAP NOW
</button>

</div>

</div>

<div class="nav">
<div onclick="goHome()"><span>🏠</span>Home</div>
<div onclick="goStake()"><span>💰</span>Stake</div>
<div class="active" onclick="goSwap()"><span>🔄</span>Swap</div>
<div onclick="goSettings()"><span>⚙️</span>Settings</div>
</div>

<script>
function calcSwap(){

let amount = parseFloat(document.getElementById('amount').value) || 0;

let receive = amount * 0.00031;

document.getElementById('receive').value = receive.toFixed(6);

}

function reverseSwap(){

let from = document.getElementById('fromToken');
let to = document.getElementById('toToken');

let temp = from.value;
from.value = to.value;
to.value = temp;

calcSwap();
}

function swapNow(){

let amount = document.getElementById('amount').value;

if(amount == '' || amount <= 0){
alert('Digite um valor.');
return;
}

alert('Swap executado no CORΛX.');
}

function goHome(){
window.location.href='app.html';
}

function goStake(){
window.location.href='stake.html';
}

function goSwap(){
window.location.href='swap.html';
}

function goSettings(){
window.location.href='settings.html';
}
</script>

</body>
</html>
