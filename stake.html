<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CORAX Stake</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#050505;
    color:#fff;
}

.wrapper{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    padding:20px 20px 100px;
}

/* HEADER */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
}

.brand{
    font-size:24px;
    letter-spacing:6px;
    font-weight:300;
}

.back{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    border:1px solid rgba(255,255,255,.06);
}

/* CARD */

.card{
    background:linear-gradient(135deg,#111,#1c1c1c);
    border-radius:24px;
    padding:24px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 0 30px rgba(168,85,247,.08);
}

.label{
    color:#888;
    font-size:13px;
    letter-spacing:2px;
}

.big{
    font-size:42px;
    color:#a855f7;
    font-weight:700;
    margin-top:10px;
}

.sub{
    margin-top:8px;
    color:#999;
    font-size:14px;
}

.progress{
    height:12px;
    background:#1a1a1a;
    border-radius:20px;
    margin-top:18px;
    overflow:hidden;
}

.bar{
    width:72%;
    height:100%;
    background:linear-gradient(90deg,#a855f7,#7e22ce);
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin-top:18px;
}

.box{
    background:#111;
    border-radius:18px;
    padding:18px;
    border:1px solid rgba(255,255,255,.06);
}

.box h3{
    color:#888;
    font-size:12px;
    margin-bottom:8px;
}

.box strong{
    font-size:22px;
}

/* INPUT */

.section{
    margin-top:28px;
}

.section h2{
    font-size:18px;
    margin-bottom:14px;
}

.input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#111;
    color:#fff;
    border:1px solid rgba(255,255,255,.06);
    outline:none;
    font-size:16px;
}

.input:focus{
    border-color:#a855f7;
}

/* BUTTONS */

.buttons{
    display:grid;
    gap:14px;
    margin-top:18px;
}

.btn{
    padding:16px;
    border:none;
    border-radius:14px;
    font-weight:700;
    letter-spacing:3px;
    cursor:pointer;
    transition:.3s;
}

.primary{
    background:#a855f7;
    color:#fff;
}

.primary:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(168,85,247,.45);
}

.secondary{
    background:#111;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
}

/* HISTORY */

.list{
    display:grid;
    gap:12px;
    margin-top:18px;
}

.item{
    background:#111;
    border-radius:18px;
    padding:15px;
    border:1px solid rgba(255,255,255,.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.green{
    color:#22c55e;
}

.small{
    color:#888;
    font-size:12px;
}

/* NAV */

.nav{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:430px;
    max-width:100%;
    background:#0c0c0c;
    border-top:1px solid rgba(255,255,255,.06);
    display:grid;
    grid-template-columns:repeat(4,1fr);
    padding:14px 0;
}

.nav div{
    text-align:center;
    color:#777;
    font-size:12px;
}

.nav span{
    display:block;
    font-size:20px;
    margin-bottom:6px;
}

.active{
    color:#a855f7 !important;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
<div class="brand">CORAX</div>
<div class="back">←</div>
</div>

<div class="card">
<div class="label">TOTAL STAKED</div>
<div class="big">8,420 CRX</div>
<div class="sub">$16,840 bloqueados</div>

<div class="progress">
<div class="bar"></div>
</div>
</div>

<div class="grid">

<div class="box">
<h3>APY</h3>
<strong>18.5%</strong>
</div>

<div class="box">
<h3>Rewards</h3>
<strong>+420 CRX</strong>
</div>

<div class="box">
<h3>Lock</h3>
<strong>30 Dias</strong>
</div>

<div class="box">
<h3>Status</h3>
<strong class="green">Ativo</strong>
</div>

</div>

<div class="section">
<h2>Stake Tokens</h2>

<input type="number" class="input" placeholder="Quantidade de CRX">

<div class="buttons">
<button class="btn primary" onclick="stake()">STAKE AGORA</button>
<button class="btn secondary" onclick="unstake()">UNSTAKE</button>
</div>
</div>

<div class="section">
<h2>Recent Rewards</h2>

<div class="list">

<div class="item">
<div>
<strong>Reward Diário</strong>
<div class="small">Hoje</div>
</div>
<div class="green">+18 CRX</div>
</div>

<div class="item">
<div>
<strong>Reward Semanal</strong>
<div class="small">7 dias</div>
</div>
<div class="green">+124 CRX</div>
</div>

<div class="item">
<div>
<strong>Bonus Pool</strong>
<div class="small">Evento</div>
</div>
<div class="green">+52 CRX</div>
</div>

</div>
</div>

</div>

<div class="nav">
<div><span>🏠</span>Home</div>
<div class="active"><span>💰</span>Stake</div>
<div><span>📜</span>History</div>
<div><span>⚙️</span>Settings</div>
</div>

<script>
function stake(){
    alert('Stake realizado com sucesso.');
}

function unstake(){
    alert('Solicitação de unstake enviada.');
}
</script>

</body>
</html>
