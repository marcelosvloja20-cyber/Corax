<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAX | Configurações</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #9d4edd; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }

        header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { color: var(--p); text-decoration: none; font-size: 1.5rem; }
        h1 { font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 3px; }

        /* Foto de Perfil */
        .profile-section { text-align: center; margin-bottom: 40px; }
        .avatar-circle { 
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--p); 
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.2) 0%, transparent 70%);
            font-size: 2rem; color: var(--p); box-shadow: 0 0 20px rgba(157, 78, 221, 0.3);
        }

        /* Campos de Configuração */
        .setting-group { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        label { display: block; font-family: 'Orbitron'; font-size: 0.6rem; color: #888; margin-bottom: 10px; letter-spacing: 1px; }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #222; padding: 12px; border-radius: 6px; color: white; outline: none; }
        input:focus { border-color: var(--p); }

        .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .wallet-addr { color: var(--p); font-family: 'Orbitron'; font-size: 0.7rem; }

        /* Toggle Switch (Segurança) */
        .toggle-box { display: flex; justify-content: space-between; align-items: center; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--p); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-save { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 6px; color: black; font-family: 'Orbitron'; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="app.html" class="back-btn">←</a>
            <h1>CONFIGURAÇÕES</h1>
        </header>

        <div class="profile-section">
            <div class="avatar-circle">👤</div>
            <p style="font-family: 'Orbitron'; font-size: 0.8rem;">USER_ID: 4402</p>
        </div>

        <div class="setting-group">
            <label>NOME DE EXIBIÇÃO</label>
            <input type="text" value="Agente Corax">
        </div>

        <div class="setting-group">
            <label>ENDEREÇO DA CARTEIRA</label>
            <div class="info-row">
                <span class="wallet-addr">0x71A...C42D</span>
                <button style="background:none; border:none; color:#888; font-size:0.6rem; cursor:pointer;">COPIAR</button>
            </div>
        </div>

        <div class="setting-group toggle-box">
            <div>
                <p style="font-size: 0.8rem; font-weight: 600;">Autenticação Biométrica</p>
                <p style="font-size: 0.6rem; color: #666;">Exigir PIN para transferências</p>
            </div>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-group toggle-box">
            <div>
                <p style="font-size: 0.8rem; font-weight: 600;">Modo Furtivo</p>
                <p style="font-size: 0.6rem; color: #666;">Ocultar saldo na tela inicial</p>
            </div>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-save" onclick="alert('Configurações salvas na rede!')">SALVAR ALTERAÇÕES</button>
    </div>

</body>
</html>
